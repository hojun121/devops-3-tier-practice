version: 0.0
os: linux

files:
  - source: /
    destination: /home/ubuntu/backend
    overwrite: true

file_exists_behavior: OVERWRITE

permissions:
  - object: /home/ubuntu/backend
    pattern: "**"
    owner: ubuntu
    group: ubuntu

hooks:
  ApplicationStop:
    - location: scripts/application_stop.sh
      timeout: 60
      runas: ubuntu
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 120
      runas: root
  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 300
      runas: ubuntu
  ApplicationStart:
    - location: scripts/application_start.sh
      timeout: 120
      runas: ubuntu
  ValidateService:
    - location: scripts/validate_service.sh
      timeout: 60
      runas: ubuntu
